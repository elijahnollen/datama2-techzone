<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TechZone</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2.5rem; border-radius: 12px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #333; }
        h3 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        #status { margin-top: 20px; font-size: 0.9rem; min-height: 1.2rem; }
        #user-display { font-size: 0.85rem; color: #888; margin-bottom: 20px; background: #252525; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>New Password</h3>
        <p id="user-display">Loading session data...</p>
        
        <input type="password" id="new-password" placeholder="New Password">
        <input type="password" id="confirm-password" placeholder="Confirm New Password">
        
        <button onclick="updatePassword()">Update Password</button>
        <p id="status"></p>
    </div>

    <script>
        // Extract parameters from the URL
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const table = params.get('table');
        const status = document.getElementById('status');

        // Forensic Guard: Ensure we have the identity data
        if (!email || !table) {
            document.getElementById('user-display').innerText = "Invalid or expired reset link.";
            document.getElementById('user-display').style.color = "#f87171";
            document.querySelector('button').disabled = true;
            document.querySelector('button').style.opacity = "0.5";
        } else {
            document.getElementById('user-display').innerText = `Resetting for: ${email}`;
        }

        async function updatePassword() {
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            // Validation Logic
            if (!password || !confirm) {
                status.innerText = "All fields are required.";
                status.style.color = "#f87171";
                return;
            }

            if (password !== confirm) {
                status.innerText = "Passwords do not match.";
                status.style.color = "#f87171";
                return;
            }

            status.innerText = "Updating secure record...";
            status.style.color = "white";

            try {
                // PATH CORRECTION: Pointing to the api/ subdirectory
                const response = await fetch('./api/update_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, table, password })
                });

                const result = await response.json();
                status.innerText = result.message;
                
                if (result.success) {
                    status.style.color = "#4ade80"; // TechZone Green
                    // Redirect back to login after 2 seconds
                    setTimeout(() => { window.location.href = 'auth-tester.html'; }, 2000);
                } else {
                    status.style.color = "#f87171";
                }
            } catch (err) {
                status.innerText = "Connection error. Ensure api folder is accessible.";
                status.style.color = "#f87171";
            }
        }
    </script>
</body>
</html>
