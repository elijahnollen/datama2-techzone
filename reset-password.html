<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password | TechZone</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        #status { margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h3>New Password</h3>
        <p id="user-display" style="font-size: 0.8rem; color: #aaa;"></p>
        <input type="password" id="new-password" placeholder="Enter new password">
        <button onclick="updatePassword()">Update Password</button>
        <p id="status"></p>
    </div>

    <script>
        // Extract parameters from the URL
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const table = params.get('table');
        const status = document.getElementById('status');

        // Forensic Guard: Check if URL parameters exist
        if (!email || !table) {
            document.getElementById('user-display').innerText = "Error: Invalid reset link.";
            document.getElementById('user-display').style.color = "red";
        } else {
            document.getElementById('user-display').innerText = `Resetting for: ${email} (${table})`;
        }

        async function updatePassword() {
            const password = document.getElementById('new-password').value;

            if (!password) {
                status.innerText = "Please enter a new password.";
                return;
            }

            status.innerText = "Processing update...";
            status.style.color = "white";

            try {
                const response = await fetch('update_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, table, password })
                });

                const result = await response.json();
                status.innerText = result.message;
                
                if (result.success) {
                    status.style.color = "#4ade80"; // TechZone Green
                    // Optional: Send them back to login after 3 seconds
                    setTimeout(() => { window.location.href = 'auth-tester.html'; }, 3000);
                } else {
                    status.style.color = "#f87171"; // Error Red
                }
            } catch (err) {
                status.innerText = "Connection error. Is your PHP server running?";
                status.style.color = "#f87171";
            }
        }
    </script>
</body>
</html>
