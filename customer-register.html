<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Signup - TechZone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f3f4f6; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: white; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: center; }
        .logo { font-size: 24px; font-weight: 700; }
        .logo-zone { color: #00bcd4; }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .register-card { background: white; padding: 40px; border-radius: 12px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .title { font-size: 28px; font-weight: 800; color: #111827; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; }
        .form-input:focus { outline: none; border-color: #00bcd4; ring: 2px solid rgba(0, 188, 212, 0.2); }
        .submit-btn { width: 100%; padding: 14px; background: #111827; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .submit-btn:hover { background: #1f2937; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-message { background: #fef2f2; color: #991b1b; padding: 12px; border-radius: 8px; border: 1px solid #fecaca; margin-bottom: 20px; font-size: 14px; display: none; }
        .login-link { text-align: center; margin-top: 24px; font-size: 14px; color: #6b7280; }
        .login-link a { color: #00bcd4; text-decoration: none; font-weight: 600; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">TECH<span class="logo-zone">ZONE</span></div>
    </header>

    <div class="main-content" id="form-container">
        <div class="register-card">
            <h2 class="title">Create Account</h2>
            <p class="subtitle">Join TechZone for the best deals</p>

            <div id="error-box" class="error-message"></div>

            <form id="customer-form">
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">First Name</label>
                        <input type="text" id="firstName" required class="form-input" placeholder="Juan">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Last Name</label>
                        <input type="text" id="lastName" required class="form-input" placeholder="Dela Cruz">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" required class="form-input" placeholder="juan@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="phone" required class="form-input" placeholder="0917XXXXXXX">
                </div>

                <div class="form-group">
                    <label class="form-label">Delivery Address</label>
                    <textarea id="address" required class="form-input" rows="2" placeholder="Street, City, Province"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" required minlength="8" class="form-input" placeholder="••••••••">
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">Sign Up</button>
            </form>

            <p class="login-link">Already have an account? <a href="customer-login.html">Sign In</a></p>
        </div>
    </div>

    <div class="main-content hidden" id="success-screen">
        <div class="register-card" style="text-align: center;">
            <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
            <h2 class="title">Welcome!</h2>
            <p class="subtitle">Your account was created successfully.</p>
            <a href="customer-login.html" class="submit-btn" style="text-decoration: none; display: block;">Start Shopping</a>
        </div>
    </div>

    <script>
        document.getElementById('customer-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errBox = document.getElementById('error-box');

            btn.disabled = true;
            btn.textContent = 'Creating Account...';
            errBox.style.display = 'none';

            const payload = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                password: document.getElementById('password').value,
                role: 'customer' // Hardcoded for security
            };

            try {
                const response = await fetch('/api/register_customer.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('form-container').classList.add('hidden');
                    document.getElementById('success-screen').classList.remove('hidden');
                } else {
                    errBox.innerText = data.message;
                    errBox.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign Up';
                }
            } catch (err) {
                errBox.innerText = "Network error. Try again later.";
                errBox.style.display = 'block';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
