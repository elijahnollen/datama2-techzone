<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | TechZone</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --admin: #06b6d4; 
            --bg: #f9fafb; 
            --input-bg: #1f2937; 
            --text-sub: #6b7280;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 15px; 
        }

        .header-title { 
            font-size: 32px; 
            font-weight: 800; 
            margin-bottom: 30px; 
            color: #111827;
            text-align: center;
        }

        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 440px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border: 1px solid #e5e7eb; 
            transition: border-top 0.3s;
            box-sizing: border-box;
        }

        .admin-active { border-top: 5px solid var(--admin); }

        .role-selector { display: flex; background: #f3f4f6; padding: 4px; border-radius: 8px; margin-bottom: 24px; }

        .role-btn { 
            flex: 1; padding: 10px; border: none; border-radius: 6px; 
            cursor: pointer; font-weight: 600; color: var(--text-sub); background: transparent; 
        }

        .role-btn.active { background: white; color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .admin-active .role-btn.active { color: var(--admin); }

        h2 { margin: 0 0 24px; font-size: 24px; color: #111827; }

        input, textarea { 
            width: 100%; padding: 12px; background: var(--input-bg); 
            border: 1px solid #374151; border-radius: 8px; color: white; 
            margin-bottom: 15px; box-sizing: border-box; font-size: 16px; 
            font-family: inherit;
        }

        .options-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            font-size: 14px; 
            flex-wrap: wrap;
            gap: 10px;
        }

        .options-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-sub); font-weight: 500; }
        .options-row input[type="checkbox"] { width: 18px; height: 18px; margin: 0; accent-color: var(--primary); cursor: pointer; }

        .link { color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: none; }
        .btn-primary { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: white; border: none; border-radius: 8px; 
            font-weight: 600; cursor: pointer; transition: 0.2s; 
            font-size: 16px;
        }
        .admin-active .btn-primary { background: var(--admin); }

        #reg-extras { display: none; }
        .footer-text { margin-top: 24px; font-size: 14px; color: var(--text-sub); text-align: center; }
        
        #response { 
            margin-top: 20px; background: #1e1e1e; color: #4ade80; 
            padding: 15px; border-radius: 8px; display: none; 
            white-space: pre-wrap; font-family: monospace; font-size: 12px;
            overflow-x: auto;
        }

        @media (max-width: 480px) {
            .header-title { font-size: 26px; }
            .login-card { padding: 25px 20px; }
            #reg-extras div { flex-direction: column; gap: 0 !important; }
        }
    </style>
</head>
<body>

    <h1 class="header-title">TechZone Portal</h1>

    <div class="login-card" id="card">
        <div class="role-selector">
            <button class="role-btn active" id="custBtn" onclick="setRole('customer')">Customer</button>
            <button class="role-btn" id="adminBtn" onclick="setRole('admin')">Admin</button>
        </div>

        <h2 id="form-title">Customer Login</h2>

        <div id="reg-extras">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="firstName" placeholder="First Name">
                <input type="text" id="lastName" placeholder="Last Name">
            </div>
            <textarea id="address" placeholder="Physical Address (Street, City, Brgy)" rows="2"></textarea>
            <input type="text" id="phone" placeholder="Phone Number">
        </div>

        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">

        <div class="options-row" id="login-options">
            <label><input type="checkbox"> Remember me</label>
            <span class="link" onclick="submitAuth('forgot')">Forgot password?</span>
        </div>

        <button class="btn-primary" id="mainBtn" onclick="submitAuth('login')">Sign In</button>

        <div class="footer-text" id="footer-note">
            Don't have an account? <span class="link" onclick="toggleView()">Register here</span>
        </div>

        <div id="response"></div>
    </div>

    <script>
        const BASE_URL = window.location.origin + "/";
        let currentRole = 'customer';
        let isReg = false;

        function setRole(r) {
            if (isReg) {
                isReg = false;
                document.getElementById('reg-extras').style.display = 'none';
                document.getElementById('login-options').style.display = 'flex';
                document.getElementById('mainBtn').innerText = 'Sign In';
                document.getElementById('mainBtn').setAttribute('onclick', "submitAuth('login')");
                document.getElementById('footer-note').innerHTML = 'Don\'t have an account? <span class="link" onclick="toggleView()">Register here</span>';
            }

            currentRole = r;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(r === 'admin' ? 'adminBtn' : 'custBtn').classList.add('active');
            
            const card = document.getElementById('card');
            card.className = r === 'admin' ? 'login-card admin-active' : 'login-card';
            
            updateTitles();
        }

        function updateTitles() {
            const title = document.getElementById('form-title');
            title.innerText = isReg ? (currentRole === 'admin' ? 'Admin Registration' : 'Customer Registration') : (currentRole === 'admin' ? 'Admin Portal' : 'Customer Login');
        }

        function toggleView() {
            if (!isReg && currentRole === 'admin') {
                const secret = prompt("Enter Admin Authorization Code to register:");
                if (secret !== "TECHZONE2026") {
                    alert("Unauthorized Access Denied.");
                    return;
                }
            }

            isReg = !isReg;
            document.getElementById('reg-extras').style.display = isReg ? 'block' : 'none';
            document.getElementById('login-options').style.display = isReg ? 'none' : 'flex';
            
            const mainBtn = document.getElementById('mainBtn');
            mainBtn.innerText = isReg ? 'Create Account' : 'Sign In';
            mainBtn.setAttribute('onclick', isReg ? "submitAuth('register')" : "submitAuth('login')");
            
            const footerNote = document.getElementById('footer-note');
            footerNote.innerHTML = isReg ? 
                'Have an account? <span class="link" onclick="toggleView()">Sign In</span>' : 
                'Don\'t have an account? <span class="link" onclick="toggleView()">Register here</span>';
            
            updateTitles();
        }

        async function submitAuth(action) {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const resBox = document.getElementById('response');
            
            resBox.style.display = 'block'; 
            resBox.style.color = "#4ade80"; 
            resBox.innerText = `Connecting for ${action}...`;

            // PATH FIX: All endpoints now explicitly use the api/ prefix
            let endpoint = '';
            if (action === 'forgot') endpoint = 'api/forgot_password.php';
            else if (action === 'register') endpoint = 'api/register.php';
            else endpoint = (currentRole === 'admin') ? 'api/login.php' : 'api/customer-login.php';

            const payload = { 
                email, password, role: currentRole, 
                first_name: document.getElementById('firstName').value || null, 
                last_name: document.getElementById('lastName').value || null,
                address: document.getElementById('address').value || null,
                phone_number: document.getElementById('phone').value || null
            };

            try {
                // Ensure the fetch calls the relative subdirectory
                const response = await fetch(BASE_URL + endpoint, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                const data = await response.json();
                resBox.innerText = JSON.stringify(data, null, 2);

                if (action === 'forgot' && data.success) {
                    setTimeout(() => { 
                        const targetTable = data.table || (currentRole === 'admin' ? 'employee' : 'customer');
                        window.location.href = `reset-password.html?email=${encodeURIComponent(email)}&table=${targetTable}`; 
                    }, 1500);
                }
                
                if (!data.success) resBox.style.color = "#f87171";
            } catch (err) { 
                resBox.innerText = "Error: " + err.message + "\nCheck if scripts are in the ./api folder."; 
                resBox.style.color = "#f87171"; 
            }
        }
    </script>
</body>
</html>
