<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone - Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f9fafb; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: white; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 24px; font-weight: 700; }
        .logo-zone { color: #00bcd4; }
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 48px 24px; }
        .container { max-width: 448px; margin: 0 auto; width: 100%; }
        .title { text-align: center; font-size: 30px; font-weight: 700; color: #111827; }
        .subtitle { text-align: center; margin-top: 8px; font-size: 14px; color: #6b7280; }
        .form-card { background: white; padding: 32px 40px; margin-top: 32px; border-radius: 8px; border: 1px solid #e5e7eb; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .form-group { margin-bottom: 24px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 4px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        .submit-btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .submit-btn:hover { background: #1d4ed8; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
        .step { width: 40px; height: 4px; background: #e5e7eb; border-radius: 2px; }
        .step.active { background: #00bcd4; }
        .step-container { display: none; }
        .step-container.active { display: block; }
        .error-message { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 12px; margin-bottom: 16px; color: #991b1b; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><span>TECH</span><span class="logo-zone">ZONE</span></div>
        <a href="index.html" style="text-decoration:none; color:#374151; font-size:14px;">Back to Home</a>
    </header>

    <div class="main-content">
        <div class="container">
            <div class="step-indicator">
                <div class="step active" id="step-1-indicator"></div>
                <div class="step" id="step-2-indicator"></div>
                <div class="step" id="step-3-indicator"></div>
            </div>

            <div class="step-container active" id="step-1">
                <h2 class="title">Reset Password</h2>
                <p class="subtitle">Enter your email to verify your account</p>
                <div class="form-card">
                    <form id="email-form">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="admin@techzone.com" required>
                        </div>
                        <div id="email-error" class="error-message">Account not found.</div>
                        <button type="submit" class="submit-btn" id="email-btn">Continue</button>
                    </form>
                </div>
            </div>

            <div class="step-container" id="step-2">
                <h2 class="title">New Password</h2>
                <p class="subtitle">Setting password for <span id="display-email" style="color:#2563eb; font-weight:600;"></span></p>
                <div class="form-card">
                    <form id="password-form">
                        <div class="form-group">
                            <label class="form-label">New Password</label>
                            <input type="password" id="new-password" class="form-input" minlength="8" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" id="confirm-password" class="form-input" required>
                        </div>
                        <div id="password-error" class="error-message"></div>
                        <button type="submit" class="submit-btn" id="pass-btn">Update Password</button>
                    </form>
                </div>
            </div>

            <div class="step-container" id="step-3">
                <div class="form-card" style="text-align: center;">
                    <h2 style="margin-bottom: 8px;">Success!</h2>
                    <p style="color:#6b7280; margin-bottom: 24px;">Your password has been updated.</p>
                    <a href="customer-login.html" id="login-redirect" class="submit-btn" style="text-decoration:none; display:block;">Return to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goToStep(step) {
            document.querySelectorAll('.step-container').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');
            for (let i = 1; i <= 3; i++) {
                const ind = document.getElementById(`step-${i}-indicator`);
                if(ind) ind.classList.toggle('active', i <= step);
            }
        }

        document.getElementById('email-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailVal = document.getElementById('email').value.trim();
            const btn = document.getElementById('email-btn');
            const err = document.getElementById('email-error');
            btn.disabled = true;
            err.style.display = 'none';

            try {
                const response = await fetch('./api/forgot_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailVal })
                });
                const data = await response.json();
                if (data.success) {
                    sessionStorage.setItem('resetEmail', emailVal);
                    sessionStorage.setItem('resetTable', data.table);
                    document.getElementById('display-email').innerText = emailVal;
                    if(data.table === 'employee') document.getElementById('login-redirect').href = 'admin-login.html';
                    goToStep(2);
                } else {
                    err.style.display = 'block';
                    btn.disabled = false;
                }
            } catch (k) { btn.disabled = false; }
        });

        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p1 = document.getElementById('new-password').value;
            const p2 = document.getElementById('confirm-password').value;
            const err = document.getElementById('password-error');
            const btn = document.getElementById('pass-btn');

            const email = sessionStorage.getItem('resetEmail');
            const table = sessionStorage.getItem('resetTable');

            if (!email || !table || table === 'undefined') {
                err.innerText = "Data lost. Please restart from Step 1.";
                err.style.display = 'block';
                return;
            }
            if (p1 !== p2) {
                err.innerText = "Passwords do not match.";
                err.style.display = 'block';
                return;
            }

            btn.disabled = true;
            try {
                const response = await fetch('./api/update_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, table, password: p1 })
                });
                const data = await response.json();
                if (data.success) {
                    sessionStorage.clear();
                    goToStep(3);
                } else {
                    err.innerText = data.message;
                    err.style.display = 'block';
                    btn.disabled = false;
                }
            } catch (k) { btn.disabled = false; }
        });
    </script>
</body>
</html>
