<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone - Customer Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f9fafb; min-height: 100vh; display: flex; flex-direction: column; }

        .header { background: white; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 24px; font-weight: 700; }
        .logo-zone { color: #2563eb; }

        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 48px 24px; }
        .login-container { max-width: 448px; margin: 0 auto; width: 100%; }
        
        .form-card { background: white; padding: 32px 40px; margin-top: 32px; border-radius: 8px; border: 1px solid #e5e7eb; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 4px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        
        .form-options { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .forgot-link { font-size: 13px; color: #2563eb; text-decoration: none; font-weight: 500; }

        .submit-btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { background: #1d4ed8; }

        .register-box { margin-top: 24px; text-align: center; border-top: 1px solid #f3f4f6; padding-top: 20px; }
        .register-text { font-size: 14px; color: #6b7280; }
        .register-link { color: #2563eb; text-decoration: none; font-weight: 600; }

        .portal-switcher { margin-top: 20px; text-align: center; padding: 16px; background: #f0f7ff; border-radius: 8px; border: 1px dashed #cfe3ff; }
        .admin-link { font-size: 13px; color: #1e40af; text-decoration: none; font-weight: 600; }

        #status-msg { margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px; }
        
        .logout-btn { display: block; margin: 20px auto 0; background: none; border: none; color: #9ca3af; font-size: 12px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><span class="logo-tech">TECH</span><span class="logo-zone">ZONE</span></div>
        <a href="index.html" style="text-decoration:none; color:#374151; font-size:14px;">Back to Shop</a>
    </header>

    <div class="main-content">
        <div class="login-container">
            <h2 style="text-align: center; font-size: 28px;">Customer Login</h2>
            <div class="form-card">
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <div class="form-options">
                        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
                </form>

                <div id="status-msg"></div>

                <div class="register-box">
                    <p class="register-text">Don't have an account? <a href="customer-register.html" class="register-link">Register here</a></p>
                </div>

                <div class="portal-switcher">
                    <a href="admin-login.html" class="admin-link">Switch to Admin Portal</a>
                </div>

                <button onclick="handleLogout()" class="logout-btn">Force Logout / Clear Session</button>
            </div>
        </div>
    </div>

    <script>
        // Handle Login Handshake
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status-msg');
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            status.innerText = "Verifying...";
            status.style.color = "#6b7280";

            try {
                const response = await fetch('./api/customer-login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    status.innerText = "Welcome back! Redirecting...";
                    status.style.color = "#10b981";
                    localStorage.setItem('userName', data.name);
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    status.innerText = data.message;
                    status.style.color = "#ef4444";
                    btn.disabled = false;
                }
            } catch (err) {
                status.innerText = "Connection error.";
                status.style.color = "#ef4444";
                btn.disabled = false;
            }
        });

        // Forensic Logout Logic
        function handleLogout() {
            localStorage.removeItem('userName');
            alert("Session cleared.");
            location.reload();
        }
    </script>
</body>
</html>
