<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone Admin - Reset Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #111827;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 32px;
            max-width: 448px;
            width: 100%;
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 24px;
        }

        .email-text {
            color: #d1d5db;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: #374151;
            border: 1px solid #4b5563;
            border-radius: 8px;
            font-size: 14px;
            color: white;
            transition: all 0.2s;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 12px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .submit-btn:hover {
            background: #2563eb;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .error-text {
            color: #fca5a5;
            font-size: 14px;
        }

        .success-card {
            text-align: center;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
            stroke: #16a34a;
        }

        .success-title {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .success-text {
            color: #9ca3af;
            margin-bottom: 16px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Reset Password Form -->
    <div class="card" id="reset-form">
        <h2 class="title">New Password</h2>
        <p class="subtitle">
            Resetting for: <span class="email-text" id="display-email"></span>
        </p>

        <form id="password-form">
            <input type="hidden" id="email" name="email">
            
            <div class="form-group">
                <input
                    type="password"
                    id="new-password"
                    name="newPassword"
                    class="form-input"
                    placeholder="New Password"
                    minlength="8"
                    required
                >
            </div>

            <div class="form-group">
                <input
                    type="password"
                    id="confirm-password"
                    name="confirmPassword"
                    class="form-input"
                    placeholder="Confirm New Password"
                    minlength="8"
                    required
                >
            </div>

            <div id="error-message" class="error-message hidden">
                <p class="error-text" id="error-text"></p>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                Update Password
            </button>
        </form>
    </div>

    <!-- Success Message -->
    <div class="card success-card hidden" id="success-message">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>
        <h2 class="success-title">Password Updated Successfully</h2>
        <p class="success-text">Redirecting you to login...</p>
    </div>

    <script>
        // Get email from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');

        if (!email) {
            // Redirect back if no email provided
            window.location.href = 'forgot-password.html';
        } else {
            document.getElementById('display-email').textContent = email;
            document.getElementById('email').value = email;
        }

        // Handle form submission
        document.getElementById('password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const submitBtn = document.getElementById('submit-btn');
            
            // Hide error
            errorDiv.classList.add('hidden');
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                errorText.textContent = 'Passwords do not match';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (newPassword.length < 8) {
                errorText.textContent = 'Password must be at least 8 characters';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating Password...';
            
            // TODO: Replace with actual PHP API call
            try {
                const response = await fetch('/api/auth/reset-password-direct.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: email, 
                        newPassword: newPassword 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Show success message
                    document.getElementById('reset-form').classList.add('hidden');
                    document.getElementById('success-message').classList.remove('hidden');
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login-page.html';
                    }, 2000);
                } else {
                    errorText.textContent = 'Failed to reset password. Please try again.';
                    errorDiv.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Update Password';
                }
            } catch (error) {
                // For demo: Show success
                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('success-message').classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = 'login-page.html';
                }, 2000);
            }
        });
    </script>
</body>
</html>
