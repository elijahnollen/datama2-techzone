<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Account - TechZone Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f9fafb; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: white; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 24px; font-weight: 700; }
        .logo-tech { color: #000; }
        .logo-zone { color: #00bcd4; }
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 48px 24px; }
        .register-container { max-width: 768px; margin: 0 auto; width: 100%; }
        .title { text-align: center; font-size: 30px; font-weight: 700; color: #111827; }
        .subtitle { text-align: center; margin-top: 8px; font-size: 14px; color: #6b7280; }
        .form-card { background: white; padding: 32px 40px; margin-top: 32px; border-radius: 8px; border: 1px solid #e5e7eb; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .form-group { margin-bottom: 24px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 4px; }
        .required { color: #ef4444; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        .submit-btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .submit-btn:hover { background: #1d4ed8; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-message { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 12px; margin-bottom: 16px; color: #991b1b; font-size: 14px; }
        .hidden { display: none; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><span class="logo-tech">TECH</span><span class="logo-zone">ZONE</span></div>
        <a href="login-page.html" style="text-decoration:none; color:#374151; font-size:14px;">Back to Login</a>
    </header>

    <div class="main-content" id="register-section">
        <div class="register-container">
            <h2 class="title">Register New Account</h2>
            <p class="subtitle">Create a secure admin account</p>

            <div class="form-card">
                <form id="registration-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">First Name <span class="required">*</span></label>
                            <input type="text" id="firstName" required class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name <span class="required">*</span></label>
                            <input type="text" id="lastName" required class="form-input">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Admin Authentication Code <span class="required">*</span></label>
                        <input type="text" id="authCode" placeholder="Enter secret code" required class="form-input" style="border: 2px solid #00bcd4;">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Employee Role <span class="required">*</span></label>
                            <input type="text" id="employeeRole" placeholder="e.g. Manager" required class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">System Role <span class="required">*</span></label>
                            <select id="role" class="form-select" required>
                                <option value="admin">Admin</option>
                                <option value="staff">Staff</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address <span class="required">*</span></label>
                        <input type="email" id="email" required class="form-input">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Password <span class="required">*</span></label>
                            <input type="password" id="password" minlength="8" required class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confirm Password <span class="required">*</span></label>
                            <input type="password" id="confirmPassword" required class="form-input">
                        </div>
                    </div>

                    <div id="error-message" class="error-message hidden"></div>
                    <button type="submit" class="submit-btn" id="submit-btn">Register Account</button>
                </form>
            </div>
        </div>
    </div>

    <div class="main-content hidden" id="success-screen">
        <div class="form-card" style="text-align: center; max-width: 448px; margin: 0 auto;">
            <h2 style="color: #16a34a; margin-bottom: 16px;">Success!</h2>
            <p>Admin account created successfully.</p>
            <a href="admin-login.html" class="submit-btn" style="text-decoration: none; display: block; margin-top: 20px;">Go to Login</a>
        </div>
    </div>

    <script>
        document.getElementById('registration-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');

            errorDiv.classList.add('hidden');

            if (password !== confirmPassword) {
                errorDiv.innerText = "Passwords do not match.";
                errorDiv.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            const payload = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                password: password,
                employeeRole: document.getElementById('employeeRole').value,
                role: document.getElementById('role').value,
                authCode: document.getElementById('authCode').value
            };

            try {
                // Root-relative path to fix 404
                const response = await fetch('/api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('register-section').classList.add('hidden');
                    document.getElementById('success-screen').classList.remove('hidden');
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Register Account';
                }
            } catch (err) {
                errorDiv.innerText = "Connection error.";
                errorDiv.classList.remove('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
