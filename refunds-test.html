<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechZone | Refund Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 40px; }
        .dashboard-card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
        .status-badge { font-size: 0.8em; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .bg-pending { background: #fef3c7; color: #92400e; }
        .bg-approved { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="container dashboard-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Refund Request Manager</h2>
        <button class="btn btn-primary" onclick="loadRequests()">Refresh List</button>
    </div>

    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Reason</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="refundTableBody">
            </tbody>
    </table>
    
    <div id="statusMsg" class="mt-3"></div>
</div>

<script>
    // UPDATE THIS to your actual URL
    const API_URL = "https://bookish-sniffle-wrp77x6pvwgpf65g-8000.app.github.dev/api/refunds.php";

    // 1. GET Request: Load all pending refunds
    async function loadRequests() {
        try {
            const response = await fetch(`${API_URL}?status=Pending`);
            const data = await response.json();
            const tbody = document.getElementById('refundTableBody');
            tbody.innerHTML = "";

            data.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>#${item.id}</td>
                        <td>${item.customer_name}</td>
                        <td>${item.reason}</td>
                        <td>₱${parseFloat(item.refund_amount).toLocaleString()}</td>
                        <td><span class="status-badge bg-pending">${item.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-success" onclick="updateStatus(${item.id}, 'Approved')">Accept</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="updateStatus(${item.id}, 'Rejected')">Decline</button>
                        </td>
                    </tr>`;
            });
        } catch (e) { console.error("Load failed", e); }
    }

    // 2. POST Request: Accept or Decline
    async function updateStatus(id, newStatus) {
        const formData = new URLSearchParams();
        formData.append('refund_id', id);
        formData.append('action', newStatus);

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const result = await response.json();
            
            document.getElementById('statusMsg').innerHTML = 
                `<div class="alert alert-success">Request #${id} marked as ${newStatus}!</div>`;
            
            loadRequests(); // Refresh the table
        } catch (e) { console.error("Update failed", e); }
    }

    // Initial Load
    loadRequests();
</script>
</body>
</html>
