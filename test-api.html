<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechZone | Product Catalog</title>
    <style>
        :root { --primary: #06b6d4; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .catalog-container { max-width: 1200px; margin: 0 auto; }
        
        /* Search & Filter Bar */
        .search-header { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .filter-grid { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 15px; }
        
        input, select, button { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); ring: 2px var(--primary); }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #0891b2; transform: translateY(-1px); }

        /* Product Grid */
        #productGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .product-info { padding: 20px; flex-grow: 1; }
        .category-label { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
        .product-name { font-size: 18px; font-weight: 600; color: var(--dark); margin: 0 0 10px 0; line-height: 1.4; }
        .product-price { font-size: 22px; font-weight: 700; color: #059669; margin-bottom: 15px; }
        
        .stock-status { font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }

        /* Technical Debug Footer */
        .debug-section { margin-top: 50px; border-top: 2px dashed #cbd5e1; padding-top: 20px; }
        .debug-box { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="catalog-container">
    <div class="search-header">
        <h1 style="margin: 0 0 20px 0; color: var(--dark);">TechZone PH</h1>
        <div class="filter-grid">
            <input type="text" id="searchInput" placeholder="What are you looking for today?">
            
            <select id="categorySelect">
                <option value="All">All Categories</option>
                <option value="Processor">Processors</option>
                <option value="Graphics Card">Graphics Cards</option>
                <option value="Motherboard">Motherboards</option>
                <option value="Memory">Memory (RAM)</option>
                <option value="Storage">Storage</option>
                <option value="Display">Displays</option>
                <option value="Peripherals">Peripherals</option>
                <option value="Audio">Audio</option>
                <option value="Furniture">Furniture</option>
                <option value="Accessories">Accessories</option>
                <option value="General Electronics">General Electronics</option>
            </select>

            <select id="supplierSelect">
                <option value="All">All Brands</option>
                <option value="AMD Phil">AMD</option>
                <option value="Asus Ph">ASUS</option>
                <option value="Gigabyte Ph">Gigabyte</option>
                <option value="Kingston D.">Kingston</option>
                <option value="Logi Dist">Logitech</option>
                <option value="Nvision">Nvision</option>
            </select>
            
            <button onclick="searchCatalog()">Search Catalog</button>
        </div>
    </div>

    <div id="productGrid">
        </div>

    <div class="debug-section">
        <h4 style="color: #64748b;">Forensic JSON Response:</h4>
        <div id="debug" class="debug-box">Execute a search to see data stream...</div>
    </div>
</div>

<script>
    const API_URL = "https://symmetrical-spoon-4j577645qxwxc6gq-8000.app.github.dev/api/products.php";

    async function searchCatalog() {
        const search = document.getElementById('searchInput').value;
        const category = document.getElementById('categorySelect').value;
        const supplier = document.getElementById('supplierSelect').value;
        const grid = document.getElementById('productGrid');
        const debug = document.getElementById('debug');

        const url = `${API_URL}?search=${encodeURIComponent(search)}&category=${encodeURIComponent(category)}&supplier=${encodeURIComponent(supplier)}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            debug.innerText = JSON.stringify(data, null, 2);

            grid.innerHTML = "";
            if (data.length === 0) {
                grid.innerHTML = "<div style='grid-column: 1/-1; text-align: center; padding: 40px;'><h3>No products found matching your search.</h3></div>";
                return;
            }

            data.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="product-info">
                            <span class="category-label">${p.category}</span>
                            <h3 class="product-name">${p.product_name}</h3>
                            <div class="product-price">₱${parseFloat(p.price).toLocaleString()}</div>
                            <div class="stock-status">
                                <div class="status-dot"></div>
                                ${p.stock_quantity > 0 ? 'In Stock' : 'Out of Stock'} — ${p.supplier_name}
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            debug.innerText = "Error fetching catalog: " + e.message;
        }
    }
    
    // Initial load
    searchCatalog();
</script>
</body>
</html>
